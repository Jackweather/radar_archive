<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Radar Archive Viewer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #08111f;
      --panel: rgba(10, 19, 35, 0.92);
      --panel-strong: rgba(6, 13, 25, 0.96);
      --text: #f3f7ff;
      --muted: #9db1cc;
      --accent: #66d9ef;
      --border: rgba(157, 177, 204, 0.22);
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Helvetica Neue", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(102, 217, 239, 0.12), transparent 32%),
        linear-gradient(180deg, #10213d 0%, var(--bg) 38%, #050a12 100%);
    }

    .viewer {
      display: grid;
      grid-template-rows: 1fr auto;
      min-height: 100vh;
    }

    .viewer.is-loading .controls {
      pointer-events: none;
      opacity: 0.6;
    }

    .stage {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 20px 0;
      min-height: 0;
    }

    .image-shell {
      position: relative;
      width: 100%;
      height: calc(100vh - 116px);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      background: rgba(4, 10, 20, 0.78);
      box-shadow: var(--shadow);
    }

    .image-shell img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .loading-screen {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 32px;
      background:
        linear-gradient(180deg, rgba(6, 13, 25, 0.84), rgba(3, 8, 16, 0.94)),
        radial-gradient(circle at top, rgba(102, 217, 239, 0.18), transparent 40%);
      z-index: 5;
      transition: opacity 220ms ease, visibility 220ms ease;
    }

    .loading-screen.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loading-card {
      width: min(420px, 100%);
      padding: 24px 22px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: rgba(8, 16, 30, 0.88);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    .loading-spinner {
      width: 56px;
      height: 56px;
      margin: 0 auto 18px;
      border-radius: 50%;
      border: 3px solid rgba(102, 217, 239, 0.18);
      border-top-color: var(--accent);
      animation: spin 0.9s linear infinite;
    }

    .loading-title {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .loading-copy {
      margin: 10px 0 18px;
      color: var(--muted);
      font-size: 0.96rem;
      line-height: 1.5;
    }

    .loading-progress {
      display: grid;
      gap: 10px;
    }

    .loading-bar {
      width: 100%;
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.07);
    }

    .loading-bar-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #4bc0d9 0%, #8ef6ff 100%);
      transition: width 160ms ease;
    }

    .loading-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .empty-state {
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      padding: 32px;
      text-align: center;
      color: var(--muted);
      font-size: 1.1rem;
    }

    .is-hidden {
      display: none !important;
    }

    .controls {
      position: sticky;
      bottom: 0;
      display: grid;
      gap: 6px;
      padding: 10px 12px 6px;
      background: var(--panel-strong);
      border-top: 1px solid var(--border);
      box-shadow: 0 -10px 24px rgba(0, 0, 0, 0.22);
    }

    .control-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1.2fr);
      gap: 8px;
      align-items: center;
      margin-top: 2px;
    }

    .field {
      min-width: 0;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      padding: 8px 10px;
      font-size: 0.9rem;
      color-scheme: dark;
      appearance: none;
    }

    select option {
      background: #0b1628;
      color: var(--text);
    }

    select:focus,
    input[type="range"]:focus {
      outline: 2px solid rgba(102, 217, 239, 0.45);
      outline-offset: 2px;
    }

    .slider-row {
      display: grid;
      gap: 6px;
      align-items: center;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
      margin: 0;
    }

    .footer-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 6px;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .footer-meta strong {
      color: var(--text);
      font-weight: 600;
    }

    .vault-trigger {
      position: fixed;
      top: 10px;
      right: 10px;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: rgba(102, 217, 239, 0.08);
      border: 1px solid rgba(102, 217, 239, 0.08);
      opacity: 0.08;
      z-index: 30;
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .vault-trigger:hover,
    .vault-trigger:focus {
      opacity: 0.45;
      transform: scale(1.08);
      outline: none;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 720px) {
      .stage {
        padding: 12px 12px 0;
      }

      .image-shell {
        height: calc(100vh - 132px);
        border-radius: 12px;
      }

      .controls {
        padding: 9px 10px 6px;
      }

      .control-row,
      .footer-meta {
        grid-template-columns: 1fr;
        display: grid;
      }
    }
  </style>
</head>
<body>
  <a class="vault-trigger" href="/vault-archive" aria-label="Open archive vault"></a>
  <div id="viewer" class="viewer is-loading">
    <main class="stage">
      <section class="image-shell">
        <div id="loadingScreen" class="loading-screen" aria-live="polite">
          <div class="loading-card">
            <div class="loading-spinner" aria-hidden="true"></div>
            <p id="loadingTitle" class="loading-title">Loading radar archive</p>
            <p id="loadingCopy" class="loading-copy">Preparing saved PNGs for the selected region.</p>
            <div class="loading-progress">
              <div class="loading-bar" aria-hidden="true">
                <div id="loadingBarFill" class="loading-bar-fill"></div>
              </div>
              <div class="loading-meta">
                <span id="loadingCount">0 / 0</span>
                <span id="loadingPercent">0%</span>
              </div>
            </div>
          </div>
        </div>
        <img id="frame-image" alt="Radar frame" class="is-hidden">
        <div id="empty-state" class="empty-state">No archived PNGs found yet.</div>
      </section>
    </main>

    <section class="controls">
      <div class="control-row">
        <div class="field">
          <label for="region-select">Region</label>
          <select id="region-select"></select>
        </div>
        <div class="field">
          <label for="frame-slider">Time</label>
          <input id="frame-slider" type="range" min="0" max="0" value="0" step="1">
        </div>
      </div>
      <div class="footer-meta">
        <div><strong id="frame-position">0 / 0</strong></div>
        <div id="frame-time">No frame selected</div>
        <div>Use the slider or arrow keys to move through time.</div>
      </div>
    </section>
  </div>

  <script>
    const viewer = document.getElementById('viewer');
    const regionSelect = document.getElementById('region-select');
    const frameSlider = document.getElementById('frame-slider');
    const framePosition = document.getElementById('frame-position');
    const frameTime = document.getElementById('frame-time');
    const frameImage = document.getElementById('frame-image');
    const emptyState = document.getElementById('empty-state');
    const loadingScreen = document.getElementById('loadingScreen');
    const loadingTitle = document.getElementById('loadingTitle');
    const loadingCopy = document.getElementById('loadingCopy');
    const loadingBarFill = document.getElementById('loadingBarFill');
    const loadingCount = document.getElementById('loadingCount');
    const loadingPercent = document.getElementById('loadingPercent');

    let currentFrames = [];
    let currentFrameIndex = 0;
    let selectedRegionKey = '';
    let followLatestFrame = true;
    let refreshTimerId = 0;
    let requestedFrameIndex = -1;
    let activeRegionToken = '';

    const frameCache = new Map();
    const pendingFrameLoads = new Map();
    const preloadQueue = [];
    const PRELOAD_RADIUS = 4;
    const MAX_CACHED_FRAMES = 36;
    let isProcessingPreloadQueue = false;

    function updateRegionOptions(regions, preserveSelection = true) {
      const previousSelection = preserveSelection ? selectedRegionKey || regionSelect.value : '';
      regionSelect.innerHTML = '';

      for (const region of regions) {
        const option = document.createElement('option');
        option.value = region.key;
        option.textContent = `${region.label} (${region.frameCount})`;
        regionSelect.appendChild(option);
      }

      if (!regions.length) {
        selectedRegionKey = '';
        return '';
      }

      const matchingRegion = regions.find((region) => region.key === previousSelection);
      selectedRegionKey = matchingRegion ? matchingRegion.key : regions[0].key;
      regionSelect.value = selectedRegionKey;
      return selectedRegionKey;
    }

    function setLoadingProgress(loadedCount, totalCount) {
      const safeTotal = Math.max(totalCount, 1);
      const percent = totalCount ? Math.round((loadedCount / safeTotal) * 100) : 0;
      loadingBarFill.style.width = `${percent}%`;
      loadingCount.textContent = `${loadedCount} / ${totalCount}`;
      loadingPercent.textContent = `${percent}%`;
    }

    function showLoading(title, copy, loadedCount = 0, totalCount = currentFrames.length) {
      viewer.classList.add('is-loading');
      loadingTitle.textContent = title;
      loadingCopy.textContent = copy;
      setLoadingProgress(loadedCount, totalCount);
      loadingScreen.classList.remove('is-hidden');
    }

    function hideLoading() {
      viewer.classList.remove('is-loading');
      loadingScreen.classList.add('is-hidden');
    }

    function renderEmpty(message) {
      clearFrameState();
      currentFrames = [];
      currentFrameIndex = 0;
      frameImage.classList.add('is-hidden');
      emptyState.classList.remove('is-hidden');
      emptyState.textContent = message;
      framePosition.textContent = '0 / 0';
      frameTime.textContent = 'No frame selected';
      frameSlider.min = '0';
      frameSlider.max = '0';
      frameSlider.value = '0';
      frameSlider.disabled = true;
      hideLoading();
    }

    function clearFrameState() {
      for (const cachedFrame of frameCache.values()) {
        URL.revokeObjectURL(cachedFrame.objectUrl);
      }

      frameCache.clear();
      pendingFrameLoads.clear();
      preloadQueue.length = 0;
      requestedFrameIndex = -1;
    }

    function getFrameCacheKey(frame) {
      return `${selectedRegionKey}:${frame.filename}`;
    }

    function trimFrameCache() {
      const protectedKeys = new Set();

      for (let offset = -PRELOAD_RADIUS; offset <= PRELOAD_RADIUS; offset += 1) {
        const frame = currentFrames[currentFrameIndex + offset];
        if (frame) {
          protectedKeys.add(getFrameCacheKey(frame));
        }
      }

      while (frameCache.size > MAX_CACHED_FRAMES) {
        const oldestKey = frameCache.keys().next().value;
        if (!oldestKey) {
          break;
        }

        if (protectedKeys.has(oldestKey)) {
          const cachedFrame = frameCache.get(oldestKey);
          frameCache.delete(oldestKey);
          frameCache.set(oldestKey, cachedFrame);
          continue;
        }

        const cachedFrame = frameCache.get(oldestKey);
        if (cachedFrame) {
          URL.revokeObjectURL(cachedFrame.objectUrl);
        }
        frameCache.delete(oldestKey);
      }
    }

    async function fetchFrameIntoCache(frame) {
      const cacheKey = getFrameCacheKey(frame);
      if (frameCache.has(cacheKey)) {
        const cachedFrame = frameCache.get(cacheKey);
        frameCache.delete(cacheKey);
        frameCache.set(cacheKey, cachedFrame);
        return cachedFrame;
      }

      if (pendingFrameLoads.has(cacheKey)) {
        return pendingFrameLoads.get(cacheKey);
      }

      const frameUrl = `${frame.url}?t=${encodeURIComponent(frame.timestamp)}`;
      const frameLoadPromise = fetch(frameUrl, { cache: 'force-cache' })
        .then((response) => {
          if (!response.ok) {
            throw new Error('Unable to fetch frame');
          }
          return response.blob();
        })
        .then(async (blob) => {
          const objectUrl = URL.createObjectURL(blob);
          const image = new Image();
          image.decoding = 'async';
          image.src = objectUrl;
          await image.decode();
          const cachedFrame = { objectUrl, image };
          frameCache.set(cacheKey, cachedFrame);
          trimFrameCache();
          return cachedFrame;
        })
        .finally(() => {
          pendingFrameLoads.delete(cacheKey);
        });

      pendingFrameLoads.set(cacheKey, frameLoadPromise);
      return frameLoadPromise;
    }

    async function processPreloadQueue() {
      if (isProcessingPreloadQueue) {
        return;
      }

      isProcessingPreloadQueue = true;
      while (preloadQueue.length) {
        const nextFrame = preloadQueue.shift();
        if (!nextFrame) {
          continue;
        }

        try {
          await fetchFrameIntoCache(nextFrame);
        } catch {
          continue;
        }
      }
      isProcessingPreloadQueue = false;
    }

    function preloadNearbyFrames(centerIndex) {
      const queuedKeys = new Set(preloadQueue.map((frame) => getFrameCacheKey(frame)));

      for (let distance = 1; distance <= PRELOAD_RADIUS; distance += 1) {
        for (const index of [centerIndex + distance, centerIndex - distance]) {
          const frame = currentFrames[index];
          if (!frame) {
            continue;
          }

          const cacheKey = getFrameCacheKey(frame);
          if (frameCache.has(cacheKey) || pendingFrameLoads.has(cacheKey) || queuedKeys.has(cacheKey)) {
            continue;
          }

          preloadQueue.push(frame);
          queuedKeys.add(cacheKey);
        }
      }

      void processPreloadQueue();
    }

    async function renderFrame(index) {
      const frame = currentFrames[index];
      if (!frame) {
        renderEmpty('No archived PNGs found for this region.');
        return;
      }

      requestedFrameIndex = index;
      currentFrameIndex = index;
      frameImage.classList.remove('is-hidden');
      emptyState.classList.add('is-hidden');
      framePosition.textContent = `${index + 1} / ${currentFrames.length}`;
      frameTime.textContent = frame.displayTime;
      frameSlider.value = String(index);
      frameSlider.disabled = currentFrames.length === 0;
      followLatestFrame = index === currentFrames.length - 1;

      const regionToken = activeRegionToken;

      try {
        const cachedFrame = await fetchFrameIntoCache(frame);
        if (requestedFrameIndex !== index || activeRegionToken !== regionToken) {
          return;
        }

        frameImage.src = cachedFrame.objectUrl;
        preloadNearbyFrames(index);
      } catch {
        if (requestedFrameIndex === index && activeRegionToken === regionToken) {
          renderEmpty('Unable to load this radar frame.');
        }
      }
    }

    async function loadRegions() {
      showLoading('Loading regions', 'Checking the archive for saved radar frames.', 0, 0);
      const response = await fetch('/api/regions', { cache: 'no-store' });
      const payload = await response.json();

      if (payload.regions.length === 0) {
        renderEmpty('No archived PNGs found yet.');
        return;
      }

      const initialRegionKey = updateRegionOptions(payload.regions, false);
      await loadFrames(initialRegionKey);
    }

    async function loadFrames(regionKey, preservePosition = false) {
      showLoading('Loading region archive', 'Preparing saved radar PNGs for the selected region.', 0, 0);

      const response = await fetch(`/api/frames/${regionKey}`, { cache: 'no-store' });
      if (!response.ok) {
        renderEmpty('Unable to load frames for this region.');
        return;
      }

      const payload = await response.json();
      selectedRegionKey = regionKey;
        activeRegionToken = `${regionKey}:${Date.now()}`;
        clearFrameState();
      const previousFilename = preservePosition ? currentFrames[currentFrameIndex]?.filename : null;
      currentFrames = payload.frames;

      if (currentFrames.length === 0) {
        renderEmpty('No archived PNGs found for this region.');
        return;
      }

      frameSlider.min = '0';
      frameSlider.max = String(currentFrames.length - 1);
      frameSlider.disabled = false;
      setLoadingProgress(currentFrames.length, currentFrames.length);

      let nextIndex = currentFrames.length - 1;
      if (preservePosition && previousFilename && !followLatestFrame) {
        const matchingIndex = currentFrames.findIndex((frame) => frame.filename === previousFilename);
        if (matchingIndex >= 0) {
          nextIndex = matchingIndex;
        }
      }

      await renderFrame(nextIndex);
      hideLoading();
    }

    async function refreshArchiveData() {
      try {
        const regionResponse = await fetch('/api/regions', { cache: 'no-store' });
        if (!regionResponse.ok) {
          return;
        }

        const previousRegionKey = selectedRegionKey;
        const regionPayload = await regionResponse.json();
        const currentRegionKey = updateRegionOptions(regionPayload.regions, true);
        if (!currentRegionKey) {
          renderEmpty('No archived PNGs found yet.');
          return;
        }

        const framesResponse = await fetch(`/api/frames/${currentRegionKey}`, { cache: 'no-store' });
        if (!framesResponse.ok) {
          return;
        }

        const framesPayload = await framesResponse.json();
        const nextFrames = framesPayload.frames;
        const regionChanged = currentRegionKey !== previousRegionKey;
        const previousLatestFilename = currentFrames[currentFrames.length - 1]?.filename;
        const nextLatestFilename = nextFrames[nextFrames.length - 1]?.filename;
        const frameCountChanged = nextFrames.length !== currentFrames.length;
        const latestFrameChanged = previousLatestFilename !== nextLatestFilename;

        if (!regionChanged && !frameCountChanged && !latestFrameChanged) {
          return;
        }

        activeRegionToken = `${currentRegionKey}:${Date.now()}`;
        if (regionChanged) {
          clearFrameState();
        }

        const previousFilename = currentFrames[currentFrameIndex]?.filename;
        currentFrames = nextFrames;

        if (!currentFrames.length) {
          renderEmpty('No archived PNGs found for this region.');
          return;
        }

        frameSlider.min = '0';
        frameSlider.max = String(currentFrames.length - 1);
        frameSlider.disabled = false;

        let nextIndex = currentFrames.length - 1;
        if (!followLatestFrame && previousFilename) {
          const matchingIndex = currentFrames.findIndex((frame) => frame.filename === previousFilename);
          if (matchingIndex >= 0) {
            nextIndex = matchingIndex;
          }
        }

        await renderFrame(nextIndex);
      } catch {
        return;
      }
    }

    function startAutoRefresh() {
      if (refreshTimerId) {
        window.clearInterval(refreshTimerId);
      }
      refreshTimerId = window.setInterval(refreshArchiveData, 60000);
    }

    regionSelect.addEventListener('change', async (event) => {
      followLatestFrame = true;
      await loadFrames(event.target.value);
    });

    frameSlider.addEventListener('input', (event) => {
      void renderFrame(Number(event.target.value));
    });

    document.addEventListener('keydown', (event) => {
      if (!currentFrames.length) {
        if ((event.ctrlKey || event.metaKey) && event.shiftKey && event.key.toLowerCase() === 'v') {
          window.location.href = '/vault-archive';
        }
        return;
      }

      if ((event.ctrlKey || event.metaKey) && event.shiftKey && event.key.toLowerCase() === 'v') {
        window.location.href = '/vault-archive';
        return;
      }

      if (event.key === 'ArrowLeft') {
        void renderFrame(Math.max(currentFrameIndex - 1, 0));
      }

      if (event.key === 'ArrowRight') {
        void renderFrame(Math.min(currentFrameIndex + 1, currentFrames.length - 1));
      }
    });

    loadRegions().catch(() => {
      renderEmpty('Unable to load the archive viewer.');
    });

    startAutoRefresh();
  </script>
</body>
</html>
